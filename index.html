<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
          content="Aether Clash – a competitive browser-based fighting game with momentum-based combat." />
    <title>Aether Clash</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <!-- Loading screen (shown until game initialises) -->
    <div id="loading" role="status" aria-label="Loading Aether Clash">
        <h1>AETHER CLASH</h1>
        <div id="loading-bar-wrap">
            <div id="loading-bar"></div>
        </div>
    </div>

    <!-- Main game canvas – internal resolution 1280×720, scaled via CSS -->
    <canvas id="game-canvas"
            width="1280"
            height="720"
            aria-label="Aether Clash game canvas">
        Your browser does not support the HTML5 Canvas element.
    </canvas>

    <!-- ── Game Scripts (order matters – dependencies first) ─────────────── -->

    <!-- 1. Constants & character/stage data -->
    <script src="js/constants.js"></script>

    <!-- 2. Math / colour utilities -->
    <script src="js/utils.js"></script>

    <!-- 3. Input manager (keyboard) -->
    <script src="js/input.js"></script>

    <!-- 4. Physics engine + knockback formula -->
    <script src="js/physics.js"></script>

    <!-- 5. Stage (platforms, blast zones) -->
    <script src="js/stage.js"></script>

    <!-- 6. Player entity -->
    <script src="js/player.js"></script>

    <!-- 7. Item system -->
    <script src="js/items.js"></script>

    <!-- 8. Camera + screen shake -->
    <script src="js/camera.js"></script>

    <!-- 9. HUD (damage %, stocks, off-screen indicators) -->
    <script src="js/hud.js"></script>

    <!-- 10. Renderer (world-space drawing) -->
    <script src="js/renderer.js"></script>

    <!-- 11. Main game controller -->
    <script src="js/game.js"></script>

    <!-- ── Bootstrap ──────────────────────────────────────────────────────── -->
    <script>
        // Hide loading screen once DOM + scripts are ready, then start game
        window.addEventListener('load', () => {
            const loading = document.getElementById('loading');
            const canvas  = document.getElementById('game-canvas');

            // Slight delay so loading bar animation completes
            setTimeout(() => {
                loading.classList.add('hidden');
                loading.addEventListener('transitionend', () => loading.remove(), { once: true });

                const game = new Game(canvas);
                game.start();
            }, 900);
        });
    </script>

</body>
</html>
